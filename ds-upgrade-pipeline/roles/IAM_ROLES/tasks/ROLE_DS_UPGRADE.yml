---
# ROLE_DS_UPGRADE — DS upgrade via shell script
#
# Only PLATFORM is required. All other config is determined by the script
# based on PLATFORM (DEV, TEST, PROD). Override via group_vars or -e only
# if you need non-default values.

- name: Verify PLATFORM is provided
  fail:
    msg: "PLATFORM variable is required (DEV, TEST, or PROD)"
  when: PLATFORM is not defined or PLATFORM == ''

- name: Set DS upgrade defaults
  set_fact:
    platform: "{{ PLATFORM }}"
    install_dir: "{{ install_dir | default('/opt/sso/install') }}"
    jdk_tar_file: "{{ jdk_tar_file | default('openjdk-17.0.2_linux-x64_bin.tar.gz') }}"
    ds_zip_file: "{{ ds_zip_file | default('DS-7.5.3.zip') }}"
    ds_script_dest: "{{ ds_script_dest | default('/opt/sso/install/ds-upgrade-7.5.sh') }}"

# --- Upload packages ---

- name: Ensure install directory exists
  file:
    path: "{{ install_dir }}"
    state: directory
    mode: '0755'

- name: Upload JDK 17 package parts (split to bypass GitHub 100MB limit)
  copy:
    src: "{{ item }}"
    dest: "{{ install_dir }}/{{ item | basename }}"
    mode: '0644'
  with_fileglob:
    - "{{ jdk_tar_file }}.part*"

- name: Upload DS 7.5.3 zip
  copy:
    src: "{{ ds_zip_file }}"
    dest: "{{ install_dir }}/{{ ds_zip_file }}"
    mode: '0644'

# --- Upload and run upgrade script ---

- name: Upload DS upgrade script
  copy:
    src: scripts/ds-upgrade-7.5.sh
    dest: "{{ ds_script_dest }}"
    mode: '0755'

- name: Run DS upgrade
  shell: "{{ ds_script_dest }}"
  args:
    executable: /bin/bash
  environment:
    PLATFORM: "{{ platform }}"
  register: ds_result

- name: Show output
  debug:
    var: ds_result.stdout_lines
