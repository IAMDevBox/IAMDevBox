---
# ROLE_DS_UPGRADE — DS upgrade via shell script
#
# Required variables:
#   action                — backup | upgrade | verify | restore
#   vault_dsrepl_password — dsrepl bind password (from ansible-vault)
#
# Optional overrides (via group_vars or -e):
#   ds_home, java_11, java_17, backup_dir, install_dir,
#   base_dn, ds_zip_file, ds_admin_port, ds_ldaps_port,
#   dsrepl_host, dsrepl_bind_dn

- name: Set DS upgrade defaults
  set_fact:
    ds_home: "{{ ds_home | default('/opt/app/forgerock/opendj') }}"
    java_11: "{{ java_11 | default('/opt/app/java/jdk-11') }}"
    java_17: "{{ java_17 | default('/opt/app/java/jdk-17') }}"
    backup_dir: "{{ backup_dir | default('/opt/app/backup') }}"
    install_dir: "{{ install_dir | default('/opt/app/install/opendj') }}"
    base_dn: "{{ base_dn | default('dc=example,dc=com') }}"
    ds_zip_file: "{{ ds_zip_file | default('DS-7.5.3.zip') }}"
    ds_admin_port: "{{ ds_admin_port | default('4444') }}"
    ds_ldaps_port: "{{ ds_ldaps_port | default('6036') }}"
    dsrepl_host: "{{ dsrepl_host | default(inventory_hostname) }}"
    dsrepl_bind_dn: "{{ dsrepl_bind_dn | default('cn=dsadmin') }}"
    dsrepl_bind_password: "{{ dsrepl_bind_password | default(vault_dsrepl_password) }}"
    ds_script_dest: "{{ ds_script_dest | default('/opt/app/install/ds-upgrade-7.5.sh') }}"

- name: Validate action parameter
  assert:
    that:
      - action is defined
      - action in ['backup', 'upgrade', 'verify', 'restore']
    fail_msg: "action must be one of: backup, upgrade, verify, restore (got '{{ action | default('undefined') }}')"

- name: Upload DS upgrade script
  copy:
    src: ds-upgrade-7.5.sh
    dest: "{{ ds_script_dest }}"
    mode: '0755'

- name: "Run DS upgrade — {{ action }}"
  shell: "{{ ds_script_dest }} {{ action }}"
  args:
    executable: /bin/bash
  environment:
    DS_HOME: "{{ ds_home }}"
    JAVA_11: "{{ java_11 }}"
    JAVA_17: "{{ java_17 }}"
    BACKUP_DIR: "{{ backup_dir }}"
    INSTALL_DIR: "{{ install_dir }}"
    BASE_DN: "{{ base_dn }}"
    DS_ZIP_FILE: "{{ ds_zip_file }}"
    DS_ADMIN_PORT: "{{ ds_admin_port }}"
    DS_LDAPS_PORT: "{{ ds_ldaps_port }}"
    DSREPL_HOST: "{{ dsrepl_host }}"
    DSREPL_BIND_DN: "{{ dsrepl_bind_dn }}"
    DSREPL_BIND_PASSWORD: "{{ dsrepl_bind_password }}"
  register: ds_result

- name: Show output
  debug:
    var: ds_result.stdout_lines
