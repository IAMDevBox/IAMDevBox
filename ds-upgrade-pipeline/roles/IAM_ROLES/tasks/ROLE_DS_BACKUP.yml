---
# ROLE_DS_BACKUP — Backup DS state before upgrade
#
# Only PLATFORM is required.

- name: Verify PLATFORM is provided
  fail:
    msg: "PLATFORM variable is required (DEV, TEST, or PROD)"
  when: PLATFORM is not defined or PLATFORM == ''

- name: Set DS backup defaults
  set_fact:
    platform: "{{ PLATFORM }}"
    ds_script_dest: "{{ ds_script_dest | default('/opt/sso/install/ds-upgrade-7.5.sh') }}"

- name: Upload DS upgrade script
  copy:
    src: scripts/ds-upgrade-7.5.sh
    dest: "{{ ds_script_dest }}"
    mode: '0755'

- name: Run DS backup
  shell: "{{ ds_script_dest }} backup"
  args:
    executable: /bin/bash
  environment:
    PLATFORM: "{{ platform }}"
  register: ds_backup_result

- name: Show output
  debug:
    var: ds_backup_result.stdout_lines
