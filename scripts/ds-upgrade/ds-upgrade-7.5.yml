---
# DS Upgrade Playbook: 7.1 → 7.5
#
# Usage:
#   ansible-playbook ds-upgrade-7.5.yml -e "action=backup"
#   ansible-playbook ds-upgrade-7.5.yml -e "action=upgrade"
#   ansible-playbook ds-upgrade-7.5.yml -e "action=verify"
#   ansible-playbook ds-upgrade-7.5.yml -e "action=restore"
#
# Test cycle:
#   backup → upgrade → verify → restore → upgrade → verify → ...
#
# Required files:
#   inventory                        — define ds_servers host group
#   group_vars/ds_servers/vault.yml  — store vault_dsrepl_password (ansible-vault encrypted)
#   group_vars/<env>/vars.yml        — per-environment overrides (ds_home, base_dn, etc.)
#   ds-upgrade-7.5.sh               — the upgrade script (uploaded by this playbook)
#
# Per-environment override example (group_vars/dev/vars.yml):
#   ds_home: /opt/app/forgerock/opendj
#   base_dn: dc=example,dc=com
#   dsrepl_host: ds1.example.com

- name: "DS Upgrade 7.1 → 7.5 ({{ action }})"
  hosts: ds_servers
  serial: 1  # Upgrade one server at a time — do NOT upgrade all replicas simultaneously
  become: true
  become_user: forgerock

  vars:
    ds_script_src: ds-upgrade-7.5.sh
    ds_script_dest: /opt/app/install/ds-upgrade-7.5.sh

    # Override these per environment in group_vars or -e
    ds_home: /opt/app/forgerock/opendj
    java_11: /opt/app/java/jdk-11
    java_17: /opt/app/java/jdk-17
    backup_dir: /opt/app/backup
    install_dir: /opt/app/install/opendj
    base_dn: "dc=example,dc=com"
    ds_zip_file: DS-7.5.3.zip
    ds_admin_port: 4444
    ds_ldaps_port: 6036
    dsrepl_host: "{{ inventory_hostname }}"
    dsrepl_bind_dn: cn=dsadmin
    dsrepl_bind_password: "{{ vault_dsrepl_password }}"

    ds_env:
      DS_HOME: "{{ ds_home }}"
      JAVA_11: "{{ java_11 }}"
      JAVA_17: "{{ java_17 }}"
      BACKUP_DIR: "{{ backup_dir }}"
      INSTALL_DIR: "{{ install_dir }}"
      BASE_DN: "{{ base_dn }}"
      DS_ZIP_FILE: "{{ ds_zip_file }}"
      DS_ADMIN_PORT: "{{ ds_admin_port }}"
      DS_LDAPS_PORT: "{{ ds_ldaps_port }}"
      DSREPL_HOST: "{{ dsrepl_host }}"
      DSREPL_BIND_DN: "{{ dsrepl_bind_dn }}"
      DSREPL_BIND_PASSWORD: "{{ dsrepl_bind_password }}"

  tasks:
    - name: Upload DS upgrade script
      ansible.builtin.copy:
        src: "{{ ds_script_src }}"
        dest: "{{ ds_script_dest }}"
        mode: '0755'

    - name: "Run ds-upgrade-7.5.sh {{ action }}"
      ansible.builtin.shell: "{{ ds_script_dest }} {{ action }}"
      args:
        executable: /bin/bash
      environment: "{{ ds_env }}"
      register: ds_result

    - name: Show output
      ansible.builtin.debug:
        var: ds_result.stdout_lines
